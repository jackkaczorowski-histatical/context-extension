<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Knowledge Graph — Context</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden; display: flex; height: 100vh;
    }
    #graph-container { flex: 1; position: relative; }
    svg { width: 100%; height: 100%; }
    .node circle { cursor: pointer; stroke: rgba(255,255,255,0.1); stroke-width: 1; }
    .node text { fill: #94a3b8; font-size: 10px; pointer-events: none; }
    .link { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
    #side-panel {
      width: 280px; background: #1e293b; border-left: 1px solid rgba(255,255,255,0.06);
      padding: 20px; overflow-y: auto; display: none; flex-direction: column; gap: 12px;
    }
    #side-panel.open { display: flex; }
    .panel-term { font-size: 18px; font-weight: 700; color: #f8fafc; }
    .panel-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .panel-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-top: 8px; }
    .panel-meta { font-size: 11px; color: #64748b; margin-top: 8px; }
    .panel-close {
      position: absolute; top: 12px; right: 12px; background: none; border: none;
      color: #64748b; font-size: 16px; cursor: pointer;
    }
    h1 {
      position: absolute; top: 16px; left: 20px; font-size: 14px; font-weight: 600;
      color: #64748b; z-index: 10;
    }
    .stats {
      position: absolute; bottom: 16px; left: 20px; font-size: 11px; color: #475569; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="graph-container">
    <h1>Knowledge Graph</h1>
    <div class="stats" id="stats"></div>
    <svg id="graph"></svg>
  </div>
  <div id="side-panel">
    <button class="panel-close" id="panel-close">&times;</button>
    <div class="panel-term" id="panel-term"></div>
    <div class="panel-type" id="panel-type"></div>
    <div class="panel-desc" id="panel-desc"></div>
    <div class="panel-meta" id="panel-meta"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const TYPE_COLORS = {
      event: '#6366f1', concept: '#6366f1', person: '#6366f1',
      people: '#6366f1', stock: '#00e676', organization: '#6366f1',
      commodity: '#6366f1', ingredient: '#6366f1', insight: '#f59e0b', other: '#64748b'
    };

    chrome.storage.local.get('knowledgeBase', (data) => {
      const kb = data.knowledgeBase || {};
      const entries = Object.values(kb);
      if (entries.length === 0) {
        document.getElementById('stats').textContent = 'No terms in knowledge base yet.';
        return;
      }

      document.getElementById('stats').textContent = `${entries.length} terms across ${new Set(entries.map(e => e.source).filter(Boolean)).size} videos`;

      // Build nodes
      const nodes = entries.map(e => ({
        id: e.term,
        type: (e.type || 'other').toLowerCase(),
        timesSeen: e.timesSeen || 1,
        source: e.source || '',
        description: e.description || '',
        firstSeen: e.firstSeen || 0
      }));

      // Build edges: terms from same source video
      const sourceGroups = {};
      entries.forEach(e => {
        if (e.source) {
          if (!sourceGroups[e.source]) sourceGroups[e.source] = [];
          sourceGroups[e.source].push(e.term);
        }
      });

      const links = [];
      const linkSet = new Set();
      Object.values(sourceGroups).forEach(terms => {
        for (let i = 0; i < terms.length && i < 20; i++) {
          for (let j = i + 1; j < terms.length && j < 20; j++) {
            const key = [terms[i], terms[j]].sort().join('|');
            if (!linkSet.has(key)) {
              linkSet.add(key);
              links.push({ source: terms[i], target: terms[j] });
            }
          }
        }
      });

      // D3 force layout
      const svg = d3.select('#graph');
      const width = window.innerWidth - 280;
      const height = window.innerHeight;

      const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-120))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => Math.max(8, Math.sqrt(d.timesSeen) * 6) + 10));

      const g = svg.append('g');

      // Zoom
      svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', (event) => {
        g.attr('transform', event.transform);
      }));

      const link = g.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('class', 'link');

      const node = g.append('g')
        .selectAll('g')
        .data(nodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append('circle')
        .attr('r', d => Math.max(8, Math.sqrt(d.timesSeen) * 6))
        .attr('fill', d => TYPE_COLORS[d.type] || '#64748b')
        .attr('opacity', 0.8);

      node.append('text')
        .attr('dx', d => Math.max(8, Math.sqrt(d.timesSeen) * 6) + 4)
        .attr('dy', 4)
        .text(d => d.id.length > 20 ? d.id.slice(0, 18) + '...' : d.id);

      node.on('click', (event, d) => {
        const panel = document.getElementById('side-panel');
        document.getElementById('panel-term').textContent = d.id;
        document.getElementById('panel-type').textContent = d.type;
        document.getElementById('panel-type').style.color = TYPE_COLORS[d.type] || '#64748b';
        document.getElementById('panel-desc').textContent = d.description || 'No description available';
        const meta = [];
        if (d.source) meta.push('Source: ' + d.source);
        meta.push('Seen ' + d.timesSeen + ' time' + (d.timesSeen !== 1 ? 's' : ''));
        if (d.firstSeen) meta.push('First seen: ' + new Date(d.firstSeen).toLocaleDateString());
        document.getElementById('panel-meta').textContent = meta.join(' · ');
        panel.classList.add('open');
      });

      document.getElementById('panel-close').addEventListener('click', () => {
        document.getElementById('side-panel').classList.remove('open');
      });

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    });
  </script>
</body>
</html>
