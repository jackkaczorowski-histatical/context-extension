<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: #00e676;
      box-shadow: 0 0 8px #00e676;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #00e676; }
      50% { opacity: 0.6; box-shadow: 0 0 16px #00e676; }
    }

    #toggleBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #00e676;
      color: #1a1a2e;
    }

    #toggleBtn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    #toggleBtn.active {
      background: #ff5252;
      color: #fff;
    }

    .status-text {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }

    .settings-toggle {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    #settingsGearBtn {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    #settingsGearBtn:hover {
      color: #fff;
      background: #2a2a3e;
    }

    #settingsPanel {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #2a2a3e;
    }

    #settingsPanel.open {
      display: block;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 12px;
      color: #aaa;
    }

    .setting-value {
      font-size: 12px;
      color: #fff;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .setting-row input[type="range"] {
      width: 90px;
      accent-color: #7c4dff;
    }

    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.on {
      background: #7c4dff;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch.on::after {
      transform: translateX(18px);
    }

    .position-toggle {
      display: flex;
      gap: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .position-toggle button {
      background: #222;
      border: none;
      color: #888;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .position-toggle button.active {
      background: #7c4dff;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Context</h1>
  </div>
  <button id="toggleBtn">Start Listening</button>
  <div class="status-text" id="statusText">Ready</div>

  <div class="settings-toggle">
    <button id="settingsGearBtn" title="Settings">&#9881;</button>
  </div>

  <div id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">Cards per chunk</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="range" id="cardsPerChunk" min="1" max="5" value="3">
        <span class="setting-value" id="cardsPerChunkVal">3</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Sidebar position</span>
      <div class="position-toggle" id="positionToggle">
        <button data-pos="left">Left</button>
        <button data-pos="right" class="active">Right</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Auto-hide (30s)</span>
      <div class="toggle-switch" id="autoHideToggle"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
