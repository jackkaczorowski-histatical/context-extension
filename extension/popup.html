<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      padding: 20px;
      background: #0e0e16;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Main popup */
    .ctx-wordmark {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0f0;
      margin-bottom: 6px;
    }

    .status-text {
      font-size: 11px;
      color: #3a3a5a;
      margin-bottom: 18px;
    }

    #toggleBtn {
      width: 100%;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: 1px solid #1e1e2e;
      color: #5a5a7a;
      font-weight: 400;
    }

    #toggleBtn:hover {
      border-color: #2a2a4a;
      color: #7a7a9a;
    }

    #toggleBtn.active {
      background: #00e676;
      color: #0e0e16;
      font-weight: 600;
      border: none;
    }

    #toggleBtn.active:hover {
      filter: brightness(1.1);
    }

    .settings-toggle {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    #settingsGearBtn {
      background: none;
      border: none;
      color: #2a2a3a;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    #settingsGearBtn:hover {
      color: #5a5a7a;
    }

    #settingsPanel {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #1e1e2e;
    }

    #settingsPanel.open {
      display: block;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 11px;
      color: #4a4a6a;
    }

    .setting-value {
      font-size: 11px;
      color: #e0e0f0;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .setting-row input[type="range"] {
      width: 80px;
      accent-color: #5a5aff;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      background: #1e1e2e;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.on {
      background: #5a5aff;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #e0e0f0;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch.on::after {
      transform: translateX(16px);
    }

    .position-toggle {
      display: flex;
      gap: 0;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #1e1e2e;
    }

    .position-toggle button {
      background: transparent;
      border: none;
      color: #3a3a5a;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .position-toggle button.active {
      background: #5a5aff;
      color: #e0e0f0;
    }

    /* Onboarding styles */
    .ob-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0f0;
      margin-bottom: 18px;
    }

    .ob-question {
      font-size: 11px;
      color: #4a4a6a;
      margin-bottom: 8px;
    }

    .ob-level-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      background: transparent;
      color: #4a4a6a;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .ob-level-btn:hover {
      border-color: #2a2a4a;
      color: #7a7a9a;
    }

    .ob-level-btn.selected {
      background: #5a5aff;
      border-color: #5a5aff;
      color: #e0e0f0;
      font-weight: 600;
    }

    .ob-check {
      font-size: 11px;
      color: #5a5a7a;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .ob-check input {
      accent-color: #5a5aff;
    }

    #getStartedBtn {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #00e676;
      color: #0e0e16;
      transition: filter 0.2s;
    }

    #getStartedBtn:hover {
      filter: brightness(1.1);
    }

    #getStartedBtn:disabled {
      opacity: 0.3;
      cursor: default;
      filter: none;
    }
  </style>
</head>
<body>
  <!-- Onboarding screen -->
  <div id="onboarding" style="display:none;">
    <div class="ob-title">Personalize your experience</div>

    <div style="margin-bottom:16px;">
      <div class="ob-question">How would you describe your knowledge level?</div>
      <div id="levelButtons" style="display:flex;gap:6px;">
        <button class="ob-level-btn" data-level="beginner">Beginner</button>
        <button class="ob-level-btn" data-level="intermediate">Intermediate</button>
        <button class="ob-level-btn" data-level="expert">Expert</button>
      </div>
    </div>

    <div style="margin-bottom:18px;">
      <div class="ob-question">What topics interest you most?</div>
      <div id="interestCheckboxes" style="display:flex;flex-direction:column;gap:6px;">
        <label class="ob-check"><input type="checkbox" value="Finance"> Finance</label>
        <label class="ob-check"><input type="checkbox" value="History"> History</label>
        <label class="ob-check"><input type="checkbox" value="Politics"> Politics</label>
        <label class="ob-check"><input type="checkbox" value="Science"> Science</label>
        <label class="ob-check"><input type="checkbox" value="Sports"> Sports</label>
      </div>
    </div>

    <button id="getStartedBtn">Get Started</button>
  </div>

  <!-- Normal popup -->
  <div id="mainPopup" style="display:none;">
    <div class="ctx-wordmark">context</div>
    <div class="status-text" id="statusText">Ready</div>
    <button id="toggleBtn">Start listening</button>

    <div class="settings-toggle">
      <button id="settingsGearBtn" title="Settings">&#9881;</button>
    </div>

    <div id="settingsPanel">
      <div class="setting-row">
        <span class="setting-label">Cards per chunk</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="cardsPerChunk" min="1" max="5" value="3">
          <span class="setting-value" id="cardsPerChunkVal">3</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sidebar position</span>
        <div class="position-toggle" id="positionToggle">
          <button data-pos="left">Left</button>
          <button data-pos="right" class="active">Right</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Auto-hide (30s)</span>
        <div class="toggle-switch" id="autoHideToggle"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
