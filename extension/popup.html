<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 24px 20px 20px;
      background: #13131e;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(90, 90, 255, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.08) 0%, transparent 60%);
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
    }

    /* ─── Header ─── */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .ctx-wordmark {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0f0;
      letter-spacing: -0.01em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(58, 58, 90, 0.5);
    }

    .status-badge.active {
      background: rgba(0, 230, 118, 0.1);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a3a5a;
    }

    .status-badge.active .status-dot {
      background: #00e676;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px #00e676; }
      50% { opacity: 0.4; box-shadow: 0 0 8px #00e676; }
    }

    .status-label {
      font-size: 10px;
      font-weight: 500;
      color: #3a3a5a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.active .status-label {
      color: #00e676;
    }

    /* ─── Main button ─── */
    #toggleBtn {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #b0b0d0;
      font-weight: 500;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    #toggleBtn:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e0f0;
      background: rgba(255, 255, 255, 0.06);
    }

    #toggleBtn.active {
      background: linear-gradient(135deg, #ff5252, #d32f2f);
      color: #fff;
      font-weight: 600;
      border: none;
      box-shadow: 0 4px 20px rgba(255, 82, 82, 0.25), 0 0 0 1px rgba(255, 82, 82, 0.3);
    }

    #toggleBtn.active:hover {
      filter: brightness(1.08);
    }

    /* ─── Weekly digest ─── */
    #digestCard {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(90, 90, 255, 0.06);
      border: 1px solid rgba(90, 90, 255, 0.12);
      font-size: 10px;
      color: #9a9aba;
      line-height: 1.5;
      position: relative;
    }

    #digestCard.visible { display: block; }

    #digestDismiss {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      color: #3a3a5a;
      font-size: 10px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    #digestDismiss:hover { color: #8a8aaa; }

    /* ─── Learning stats ─── */
    #learningStats {
      display: none;
      font-size: 10px;
      color: #3a3a5a;
      text-align: center;
      margin-top: 10px;
    }

    #learningStats.visible { display: block; }

    /* ─── Footer links ─── */
    .popup-footer {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-btn {
      background: none;
      border: none;
      color: #7a7a9a;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .footer-btn:hover {
      color: #9a9aba;
    }

    .footer-btn .icon {
      font-size: 11px;
      vertical-align: -1px;
      margin-right: 3px;
    }

    /* ─── Settings panel ─── */
    #settingsPanel {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #settingsPanel.open {
      display: block;
    }

    .settings-title {
      font-size: 10px;
      font-weight: 600;
      color: #3a3a5a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 11px;
      color: #5a5a7a;
    }

    .setting-value {
      font-size: 11px;
      color: #e0e0f0;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
    }

    .setting-row input[type="range"] {
      width: 72px;
      height: 4px;
      accent-color: #5a5aff;
      border-radius: 2px;
    }

    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      background: #1a1a28;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .toggle-switch.on {
      background: #5a5aff;
      border-color: #5a5aff;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #6a6a8a;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch.on::after {
      transform: translateX(16px);
      background: #fff;
    }

    .position-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .position-toggle button {
      background: transparent;
      border: none;
      color: #3a3a5a;
      font-size: 10px;
      font-family: inherit;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .position-toggle button.active {
      background: #5a5aff;
      color: #e0e0f0;
    }

    /* ─── Onboarding ─── */
    .ob-title {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0f0;
      margin-bottom: 4px;
    }

    .ob-subtitle {
      font-size: 11px;
      color: #3a3a5a;
      margin-bottom: 16px;
    }

    .ob-section {
      margin-bottom: 14px;
    }

    .ob-section:last-of-type {
      margin-bottom: 14px;
    }

    .ob-question {
      font-size: 10px;
      font-weight: 600;
      color: #4a4a6a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .ob-level-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: #5a5a7a;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ob-level-btn:hover {
      border-color: rgba(255, 255, 255, 0.12);
      color: #8a8aaa;
      background: rgba(255, 255, 255, 0.04);
    }

    .ob-level-btn.selected {
      background: rgba(90, 90, 255, 0.15);
      border-color: rgba(90, 90, 255, 0.4);
      color: #a0a0ff;
      font-weight: 600;
    }

    .ob-check {
      font-size: 11px;
      color: #5a5a7a;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 3px 0;
      transition: color 0.15s;
    }

    .ob-check:hover {
      color: #8a8aaa;
    }

    .ob-check input {
      accent-color: #5a5aff;
      width: 13px;
      height: 13px;
    }

    #getStartedBtn {
      width: 100%;
      height: 40px;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #0a0a12;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.2);
    }

    #getStartedBtn:hover {
      filter: brightness(1.08);
      box-shadow: 0 4px 24px rgba(0, 230, 118, 0.3);
    }

    #getStartedBtn:disabled {
      opacity: 0.2;
      cursor: default;
      filter: none;
      box-shadow: none;
    }

    /* ─── Session recap ─── */
    #recapSection {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #recapSection.visible { display: block; }

    .recap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .recap-count {
      font-size: 11px;
      color: #5a5a7a;
    }

    .recap-count strong {
      color: #b0b0d0;
      font-weight: 600;
    }

    #viewRecapBtn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #7a7aaa;
      font-size: 10px;
      font-family: inherit;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #viewRecapBtn:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: #b0b0d0;
      background: rgba(255, 255, 255, 0.04);
    }

    /* ─── Recap overlay ─── */
    #recapOverlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      min-height: 100%;
      background: #0e0e16;
      z-index: 20;
      padding: 16px 16px 12px;
      flex-direction: column;
      overflow: hidden;
    }

    #recapOverlay.open {
      display: flex;
    }

    .recap-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .recap-overlay-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0f0;
    }

    .recap-close-btn {
      background: none;
      border: none;
      color: #3a3a5a;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .recap-close-btn:hover { color: #8a8aaa; }

    #recapList {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    #recapList::-webkit-scrollbar { width: 3px; }
    #recapList::-webkit-scrollbar-track { background: transparent; }
    #recapList::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 2px; }

    .recap-group-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 0 4px;
    }

    .recap-term {
      font-size: 11px;
      color: #b0b0d0;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .recap-term-desc {
      font-size: 10px;
      color: #4a4a6a;
      margin-top: 1px;
    }

    .recap-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .recap-action-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: #7a7aaa;
      font-size: 10px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .recap-action-btn:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: #b0b0d0;
      background: rgba(255, 255, 255, 0.04);
    }

    .recap-action-btn.copied {
      color: #00e676;
      border-color: rgba(0, 230, 118, 0.3);
    }

    #onboarding.overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: #13131e;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(90, 90, 255, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.08) 0%, transparent 60%);
      z-index: 10;
      padding: 24px 20px 20px;
    }
  </style>
</head>
<body>
  <!-- Onboarding screen -->
  <div id="onboarding" style="display:none;">
    <div class="ob-title">context</div>
    <div class="ob-subtitle">Personalize your experience</div>

    <div class="ob-section">
      <div class="ob-question">Knowledge level</div>
      <div id="levelButtons" style="display:flex;gap:6px;">
        <button class="ob-level-btn" data-level="beginner">Beginner</button>
        <button class="ob-level-btn" data-level="intermediate">Intermediate</button>
        <button class="ob-level-btn" data-level="expert">Expert</button>
      </div>
    </div>

    <div class="ob-section">
      <div class="ob-question">Topics</div>
      <div id="interestCheckboxes" style="display:flex;flex-direction:column;gap:4px;">
        <label class="ob-check"><input type="checkbox" value="Finance & Economics"> Finance & Economics</label>
        <label class="ob-check"><input type="checkbox" value="History & Culture"> History & Culture</label>
        <label class="ob-check"><input type="checkbox" value="Politics & Law"> Politics & Law</label>
        <label class="ob-check"><input type="checkbox" value="Science & Technology"> Science & Technology</label>
        <label class="ob-check"><input type="checkbox" value="Business & Markets"> Business & Markets</label>
        <label class="ob-check"><input type="checkbox" value="Arts & Society"> Arts & Society</label>
      </div>
    </div>

    <button id="getStartedBtn" disabled>Get Started</button>
  </div>

  <!-- Normal popup -->
  <div id="mainPopup" style="display:none;">
    <div class="popup-header">
      <span class="ctx-wordmark">context</span>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-label" id="statusText">Ready</span>
      </div>
    </div>

    <button id="toggleBtn">Start listening</button>

    <div id="digestCard">
      <span id="digestText"></span>
      <button id="digestDismiss">&#x2715;</button>
    </div>

    <div id="learningStats"></div>

    <div id="recapSection">
      <div class="recap-header">
        <span class="recap-count"><strong id="recapCount">0</strong> terms detected</span>
        <button id="viewRecapBtn">View recap</button>
      </div>
    </div>

    <div class="popup-footer">
      <button class="footer-btn" id="settingsGearBtn"><span class="icon">&#9881;</span> Settings</button>
      <button class="footer-btn" id="editPrefsBtn"><span class="icon">&#9998;</span> Preferences</button>
    </div>

    <div id="settingsPanel">
      <div class="settings-title">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Cards per chunk</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="cardsPerChunk" min="1" max="5" value="3">
          <span class="setting-value" id="cardsPerChunkVal">3</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Depth</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="depthSlider" min="1" max="3" value="2">
          <span class="setting-value" id="depthVal">Balanced</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sidebar position</span>
        <div class="position-toggle" id="positionToggle">
          <button data-pos="left">Left</button>
          <button data-pos="right" class="active">Right</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Auto-hide (30s)</span>
        <div class="toggle-switch" id="autoHideToggle"></div>
      </div>
    </div>
  </div>

  <div id="recapOverlay">
    <div class="recap-overlay-header">
      <span class="recap-overlay-title">Session Recap</span>
      <button class="recap-close-btn" id="recapCloseBtn">&#x2715;</button>
    </div>
    <div id="recapList"></div>
    <div class="recap-actions">
      <button class="recap-action-btn" id="copyRecapBtn">Copy to clipboard</button>
      <button class="recap-action-btn" id="exportGuideBtn">Export study guide</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
