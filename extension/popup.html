<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 24px 20px 20px;
      background: #0e0e16;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(90, 90, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.04) 0%, transparent 60%);
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
    }

    /* ─── Header ─── */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .ctx-wordmark {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0f0;
      letter-spacing: -0.01em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(58, 58, 90, 0.3);
    }

    .status-badge.active {
      background: rgba(0, 230, 118, 0.1);
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a3a5a;
    }

    .status-badge.active .status-dot {
      background: #00e676;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px #00e676; }
      50% { opacity: 0.4; box-shadow: 0 0 8px #00e676; }
    }

    .status-label {
      font-size: 10px;
      font-weight: 500;
      color: #3a3a5a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.active .status-label {
      color: #00e676;
    }

    /* ─── Main button ─── */
    #toggleBtn {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #b0b0d0;
      font-weight: 500;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    #toggleBtn:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e0f0;
      background: rgba(255, 255, 255, 0.06);
    }

    #toggleBtn.active {
      background: linear-gradient(135deg, #ff5252, #d32f2f);
      color: #fff;
      font-weight: 600;
      border: none;
      box-shadow: 0 4px 20px rgba(255, 82, 82, 0.25), 0 0 0 1px rgba(255, 82, 82, 0.3);
    }

    #toggleBtn.active:hover {
      filter: brightness(1.08);
    }

    /* ─── Footer links ─── */
    .popup-footer {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-btn {
      background: none;
      border: none;
      color: #5a5a7a;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .footer-btn:hover {
      color: #9a9aba;
    }

    .footer-btn .icon {
      font-size: 11px;
      vertical-align: -1px;
      margin-right: 3px;
    }

    /* ─── Settings panel ─── */
    #settingsPanel {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #settingsPanel.open {
      display: block;
    }

    .settings-title {
      font-size: 10px;
      font-weight: 600;
      color: #3a3a5a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 11px;
      color: #5a5a7a;
    }

    .setting-value {
      font-size: 11px;
      color: #e0e0f0;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
    }

    .setting-row input[type="range"] {
      width: 72px;
      height: 4px;
      accent-color: #5a5aff;
      border-radius: 2px;
    }

    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      background: #1a1a28;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .toggle-switch.on {
      background: #5a5aff;
      border-color: #5a5aff;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #6a6a8a;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch.on::after {
      transform: translateX(16px);
      background: #fff;
    }

    .position-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .position-toggle button {
      background: transparent;
      border: none;
      color: #3a3a5a;
      font-size: 10px;
      font-family: inherit;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .position-toggle button.active {
      background: #5a5aff;
      color: #e0e0f0;
    }

    /* ─── Onboarding ─── */
    .ob-title {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0f0;
      margin-bottom: 4px;
    }

    .ob-subtitle {
      font-size: 11px;
      color: #3a3a5a;
      margin-bottom: 16px;
    }

    .ob-section {
      margin-bottom: 14px;
    }

    .ob-section:last-of-type {
      margin-bottom: 14px;
    }

    .ob-question {
      font-size: 10px;
      font-weight: 600;
      color: #4a4a6a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .ob-level-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: #5a5a7a;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ob-level-btn:hover {
      border-color: rgba(255, 255, 255, 0.12);
      color: #8a8aaa;
      background: rgba(255, 255, 255, 0.04);
    }

    .ob-level-btn.selected {
      background: rgba(90, 90, 255, 0.15);
      border-color: rgba(90, 90, 255, 0.4);
      color: #a0a0ff;
      font-weight: 600;
    }

    .ob-check {
      font-size: 11px;
      color: #5a5a7a;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 3px 0;
      transition: color 0.15s;
    }

    .ob-check:hover {
      color: #8a8aaa;
    }

    .ob-check input {
      accent-color: #5a5aff;
      width: 13px;
      height: 13px;
    }

    #getStartedBtn {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #0a0a12;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.2);
    }

    #getStartedBtn:hover {
      filter: brightness(1.08);
      box-shadow: 0 4px 24px rgba(0, 230, 118, 0.3);
    }

    #getStartedBtn:disabled {
      opacity: 0.2;
      cursor: default;
      filter: none;
      box-shadow: none;
    }

    #onboarding.overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0e0e16;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(90, 90, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 230, 118, 0.04) 0%, transparent 60%);
      z-index: 10;
      padding: 24px 20px 20px;
    }
  </style>
</head>
<body>
  <!-- Onboarding screen -->
  <div id="onboarding" style="display:none;">
    <div class="ob-title">context</div>
    <div class="ob-subtitle">Personalize your experience</div>

    <div class="ob-section">
      <div class="ob-question">Knowledge level</div>
      <div id="levelButtons" style="display:flex;gap:6px;">
        <button class="ob-level-btn" data-level="beginner">Beginner</button>
        <button class="ob-level-btn" data-level="intermediate">Intermediate</button>
        <button class="ob-level-btn" data-level="expert">Expert</button>
      </div>
    </div>

    <div class="ob-section">
      <div class="ob-question">Topics</div>
      <div id="interestCheckboxes" style="display:flex;flex-direction:column;gap:4px;">
        <label class="ob-check"><input type="checkbox" value="Finance & Economics"> Finance & Economics</label>
        <label class="ob-check"><input type="checkbox" value="History & Culture"> History & Culture</label>
        <label class="ob-check"><input type="checkbox" value="Politics & Law"> Politics & Law</label>
        <label class="ob-check"><input type="checkbox" value="Science & Technology"> Science & Technology</label>
        <label class="ob-check"><input type="checkbox" value="Business & Markets"> Business & Markets</label>
        <label class="ob-check"><input type="checkbox" value="Arts & Society"> Arts & Society</label>
      </div>
    </div>

    <button id="getStartedBtn" disabled>Get Started</button>
  </div>

  <!-- Normal popup -->
  <div id="mainPopup" style="display:none;">
    <div class="popup-header">
      <span class="ctx-wordmark">context</span>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-label" id="statusText">Ready</span>
      </div>
    </div>

    <button id="toggleBtn">Start listening</button>

    <div class="popup-footer">
      <button class="footer-btn" id="settingsGearBtn"><span class="icon">&#9881;</span> Settings</button>
      <button class="footer-btn" id="editPrefsBtn"><span class="icon">&#9998;</span> Preferences</button>
    </div>

    <div id="settingsPanel">
      <div class="settings-title">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Cards per chunk</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="cardsPerChunk" min="1" max="5" value="3">
          <span class="setting-value" id="cardsPerChunkVal">3</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Depth</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="range" id="depthSlider" min="1" max="3" value="2">
          <span class="setting-value" id="depthVal">Balanced</span>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sidebar position</span>
        <div class="position-toggle" id="positionToggle">
          <button data-pos="left">Left</button>
          <button data-pos="right" class="active">Right</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Auto-hide (30s)</span>
        <div class="toggle-switch" id="autoHideToggle"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
