<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Context</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f1a;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #ffffff;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #a0a0c0;
      margin-bottom: 32px;
    }
    a.cta {
      display: inline-block;
      padding: 12px 32px;
      background: #14b8a6;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a.cta:hover { background: #0d9488; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Context!</h1>
    <p>You're all set. Open any YouTube video and click the Context icon to start listening.</p>
    <a class="cta" href="https://www.youtube.com">Go to YouTube</a>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const source = params.get('utm_source') || params.get('source') || '';
      const medium = params.get('utm_medium') || '';
      const campaign = params.get('utm_campaign') || '';
      if (source || medium || campaign) {
        chrome.storage.local.set({
          installAttribution: {
            source: source || 'organic',
            medium: medium,
            campaign: campaign,
            timestamp: new Date().toISOString()
          }
        });
      }
    })();
  </script>
</body>
</html>
